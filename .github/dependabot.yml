version: 2
updates:
# Keep GitHub Actions up to date
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    actions:
      patterns:
        - "*"

# Keep Python dependencies up to date via uv
- package-ecosystem: uv
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    python-deps:
      patterns:
      - "*"