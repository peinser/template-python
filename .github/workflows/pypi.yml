name: PyPI
run-name: ${{ github.actor }} is publishing a PyPI release

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - docker/**
    - src/**
    - tests/**
    - pyproject.toml

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: "3.14"
    - name: Publish
      env:
        UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_KEY }}
      run: |
        uv build
        uv publish
