name: Documentation
run-name: ${{ github.actor }} is building and deploying the documentation

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - docs/**
    - src/**
    - mkdocs.yml

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: "3.14"
    - name: Deploy documentation
      run: |
        git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/peinser/template.git
        git fetch
        uv sync --group docs
        uv run mkdocs gh-deploy --clean --verbose
